{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Панель управления</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1 class="login-card__title">Панель управления</h1>
            <p class="login-card__subtitle">Войдите в свой аккаунт</p>
            {% if messages %}
            {% for message in messages %}
            <div class="message message--{{ message.tags }}" style="margin-bottom:16px;">{{ message }}</div>
            {% endfor %}
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn--primary btn--lg">Войти</button>
            </form>
        </div>
    </div>
</body>
</html>
